<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Oficinas e apresentações</title>
  <style>
    :root {
      color-scheme: light;
      --red: #7a1f1f;
      --cream: #f7efe2;
      --ink: #231f20;
      --gold: #b78b3b;
    }

    body {
      font-family: system-ui, sans-serif;
      max-width: 760px;
      margin: 5rem auto;
      padding: 0 1.5rem;
      line-height: 1.5;
      background: var(--cream);
      color: var(--ink);
    }

    h1 {
      font-size: clamp(2rem, 6vw, 2.75rem);
      line-height: 1.05;
    }

    a {
      color: var(--red);
      font-weight: 750;
      text-decoration-thickness: 0.08em;
      text-underline-offset: 0.2em;
    }

    ul {
      padding-left: 1.25rem;
    }

    li {
      margin: 0.8rem 0;
      font-size: 1.15rem;
    }

    .note {
      border-top: 3px solid var(--gold);
      margin-top: 2.5rem;
      padding-top: 1rem;
    }
  </style>
</head>
<body>
  <main>
    <h1>Oficinas e apresentações</h1>
    <ul>
      <li><a href="./oficina-unb/">Tupi Antigo: uma língua de contato no Brasil colonial</a></li>
    </ul>
    <p class="note">Apresentações HTML interativas construídas com Slidev.</p>
  </main>
</body>
</html>
